name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Tests
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Test GitData package
        run: |
          swift package --package-path Packages/GitData clean
          swift test --package-path Packages/GitData

      - name: Test Presenters package
        run: |
          swift package --package-path Packages/Presenters clean
          swift test --package-path Packages/Presenters
